services:
  - type: web
    name: contextflow-rag-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama3-70b-8192
      - key: TOP_K
        value: "4"
      - key: CHUNK_SIZE
        value: "1200"
      - key: CHUNK_OVERLAP
        value: "200"
      - key: ENABLE_FAISS_PERSISTENCE
        value: "false"
      - key: LOG_LEVEL
        value: INFO
